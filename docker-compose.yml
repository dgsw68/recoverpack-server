version: '3.8'

services:
  go-api:
    build:
      context: ./go-api
      dockerfile: Dockerfile
    container_name: recoverpack-go-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AI_SERVICE_URL=http://ai-service:8000
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CREDENTIALS_JSON=${FIREBASE_CREDENTIALS_JSON}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
      - GENERATED_PACKAGES_DIR=/data/generated-packages
      - AUTH_SECRET=${AUTH_SECRET}
    volumes:
      - generated-packages:/data/generated-packages
    depends_on:
      - ai-service
    restart: always

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: recoverpack-ai-service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

volumes:
  generated-packages:
