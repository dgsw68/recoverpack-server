services:
  go-api:
    build:
      context: ./go-api
      dockerfile: Dockerfile
    container_name: recoverpack-go-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AI_SERVICE_URL=http://ai-service:8000
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-recoverpack}
      - FIREBASE_CREDENTIALS_FILE=/run/secrets/firebase-service-account.json
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET:-recoverpack.firebasestorage.app}
      - GENERATED_PACKAGES_DIR=/data/generated-packages
      - UPLOAD_DIR=/data/uploaded-files
      - AUTH_SECRET=${AUTH_SECRET:-recoverpack-local-development-secret-change-me}
    volumes:
      - generated-packages:/data/generated-packages
      - uploaded-files:/data/uploaded-files
      - ./secrets/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
    depends_on:
      - ai-service
    restart: always

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: recoverpack-ai-service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

volumes:
  generated-packages:
  uploaded-files:
